<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Subhy Power Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="database.js"></script>

    <style>
        :root {
            --primary: #c21a09;
            --secondary: #0a2e87;
            --bg: #020617;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; color: white; }

        .sidebar {
            width: 260px; background: rgba(10, 46, 135, 0.15); height: 100vh; position: fixed;
            padding: 30px 20px; border-right: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px);
        }

        .sidebar h2 { color: white; font-size: 1.2rem; border-left: 4px solid var(--primary); padding-left: 12px; margin-bottom: 40px; }
        .sidebar a { color: #94a3b8; text-decoration: none; padding: 12px; display: block; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; font-weight: 600; }
        .sidebar a:hover, .sidebar a.active { background: var(--secondary); color: white; }

        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); color: var(--text); padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .stat-card p { margin: 0; font-size: 14px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        .stat-card h2 { margin: 10px 0 0 0; font-size: 26px; font-weight: 800; color: var(--secondary); }

        .table-card { background: var(--card); color: var(--text); padding: 25px; border-radius: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #f1f5f9; color: #64748b; font-size: 12px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }

        .btn-export { background: var(--success); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        @media print { .sidebar, .top-bar { display: none; } .main-content { margin: 0; width: 100%; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>SUBHY POWER</h2>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="billing.html">🧾 Create Invoice</a>
        <a href="stock.html">📦 Inventory</a>
        <a href="warranty.html">🛡️ Warranty</a>
        <a href="customers.html">👥 Customers</a>
        <a href="reports.html" class="active">📈 Reports</a>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1>Business Analytics</h1>
            <button class="btn-export" onclick="window.print()">📥 Export PDF Report</button>
        </div>
        
        <div class="grid-3">
            <div class="stat-card">
                <p>Gross Revenue</p>
                <h2 id="repRevenue">₹ 0</h2>
            </div>
            <div class="stat-card">
                <p>GST Collected (18%)</p>
                <h2 id="repGst" style="color: var(--primary);">₹ 0</h2>
            </div>
            <div class="stat-card">
                <p>Net Business Value</p>
                <h2 id="repNet" style="color: var(--success);">₹ 0</h2>
            </div>
        </div>

        <div class="table-card">
            <h3 style="margin-top:0; margin-bottom: 20px;">Sales Log (All Invoices)</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Invoice</th>
                        <th>Customer</th>
                        <th>Product</th>
                        <th>Total Amount</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        function generateReport() {
            const db = JSON.parse(localStorage.getItem("SubhyPower_MasterDB")) || { billing: [] };
            const tbody = document.getElementById('reportTableBody');
            
            let totalRev = 0;
            tbody.innerHTML = "";

            if (db.billing.length === 0) {
                tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No sales data found.</td></tr>";
                return;
            }

            db.billing.forEach(bill => {
                // Amount clean karke number mein badlo
                let amt = parseFloat(bill.amount.replace(/[₹,]/g, '')) || 0;
                totalRev += amt;

                tbody.innerHTML += `
                    <tr>
                        <td>${bill.date}</td>
                        <td>#${bill.invNo}</td>
                        <td><b>${bill.customer}</b></td>
                        <td>${bill.product}</td>
                        <td style="font-weight:700;">${bill.amount}</td>
                    </tr>
                `;
            });

            // Calculations
            let gst = totalRev * 0.18;
            let net = totalRev - gst;

            // Display values
            document.getElementById('repRevenue').innerText = "₹ " + totalRev.toLocaleString('en-IN');
            document.getElementById('repGst').innerText = "₹ " + gst.toLocaleString('en-IN');
            document.getElementById('repNet').innerText = "₹ " + net.toLocaleString('en-IN');
        }

        window.onload = generateReport;
    </script>
</body>
</html>
