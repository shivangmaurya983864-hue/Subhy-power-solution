<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Subhy Power Solution</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<script src="database.js"></script>

<style>
:root{
--sidebar-bg:#0f172a;
--main-bg:#020617;
--card-bg:rgba(30,41,59,0.7);
--accent:#3b82f6;
--neon-green:#10b981;
--neon-red:#ef4444;
--text-main:#f8fafc;
--text-dim:#94a3b8;
--glass-border:rgba(255,255,255,0.08);
}

body{
background-color:var(--main-bg);
color:var(--text-main);
font-family:'Plus Jakarta Sans',sans-serif;
margin:0;
display:flex;
overflow-x:hidden;
background-image:radial-gradient(circle at 50% 50%,#111e32 0%,#020617 100%);
}

.sidebar{
width:280px;
background:var(--sidebar-bg);
height:100vh;
position:fixed;
border-right:1px solid var(--glass-border);
padding:40px 20px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.shop-brand h2{
font-size:1.4rem;
font-weight:800;
margin-bottom:50px;
background:linear-gradient(to right,#fff,var(--accent));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sidebar-menu a{
color:var(--text-dim);
text-decoration:none;
padding:14px 18px;
display:flex;
align-items:center;
gap:12px;
border-radius:12px;
margin-bottom:8px;
font-weight:600;
}

.sidebar-menu a:hover,
.sidebar-menu a.active{
background:rgba(59,130,246,0.1);
color:var(--accent);
}

.main-content{
margin-left:280px;
padding:50px;
width:calc(100% - 280px);
}

.header-flex{
display:flex;
justify-content:space-between;
align-items:flex-end;
margin-bottom:40px;
}

.header-logout-btn{
background:rgba(239,68,68,0.1);
color:var(--neon-red);
padding:12px 24px;
border-radius:100px;
text-decoration:none;
font-weight:700;
font-size:0.85rem;
border:1px solid rgba(239,68,68,0.2);
}

.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
margin-bottom:40px;
}

.stat-card{
background:var(--card-bg);
padding:25px;
border-radius:24px;
border:1px solid var(--glass-border);
}

.stat-card p{
color:var(--text-dim);
font-size:0.9rem;
margin-bottom:10px;
}

.stat-card h2{
font-size:1.8rem;
margin:0;
font-family:'Space Grotesk';
}

.table-container{
background:var(--card-bg);
border-radius:24px;
padding:30px;
border:1px solid var(--glass-border);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
text-align:left;
padding:15px;
color:var(--text-dim);
font-size:0.8rem;
border-bottom:1px solid var(--glass-border);
}

td{
padding:20px 15px;
border-bottom:1px solid rgba(255,255,255,0.03);
}

.btn-new{
background:var(--accent);
color:white;
padding:12px 25px;
border-radius:12px;
text-decoration:none;
font-weight:700;
}

.status-badge{
background:rgba(16,185,129,0.1);
color:var(--neon-green);
padding:6px 12px;
border-radius:20px;
font-size:0.7rem;
font-weight:700;
}
</style>
</head>

<body>

<div class="sidebar">
<div>

<div class="shop-brand">
<h2>Subhy Power</h2>
</div>

<div class="sidebar-menu">
<a href="dashboard.html" class="active">📊 Dashboard</a>
<a href="billing.html">🧾 New Invoice</a>
<a href="stock.html">📦 Inventory</a>
<a href="warranty.html">🛡️ Warranty</a>
<a href="customers.html">👥 Customers</a>
<a href="reports.html">📈 Reports</a>
</div>

</div>
</div>

<div class="main-content">

<div class="header-flex">

<div>
<h1 style="margin:0;font-size:2.2rem;">Shop Overview</h1>
<p id="liveClock" style="color:var(--accent);font-weight:600;"></p>
</div>

<a href="index.html" class="header-logout-btn">
End Session 🚀
</a>

</div>

<div class="stats-grid">

<div class="stat-card">
<p>Total Revenue</p>
<h2 id="totalRevenue">₹ 0</h2>
</div>

<div class="stat-card">
<p>Invoices Generated</p>
<h2 id="totalBills">0</h2>
</div>

<div class="stat-card">
<p>Total Customers</p>
<h2 id="totalCust">0</h2>
</div>

<div class="stat-card">
<p>Low Stock Items</p>
<h2 id="lowStockCount" style="color:var(--neon-red)">0</h2>
</div>

</div>

<div class="table-container">

<div style="display:flex;justify-content:space-between;align-items:center">
<h3>Recent Transactions</h3>
<a href="billing.html" class="btn-new">+ Create Bill</a>
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Customer</th>
<th>Product</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>

<tbody id="recentTransactionsBody"></tbody>
</table>

</div>

</div>

<script>

/* CLOCK */

function updateClock(){
const now=new Date()

document.getElementById("liveClock").innerText=
now.toLocaleString("en-IN",{
weekday:'long',
day:'numeric',
month:'short',
hour:'2-digit',
minute:'2-digit',
second:'2-digit'
}).toUpperCase()
}

setInterval(updateClock,1000)
updateClock()


/* DASHBOARD */

function updateDashboard(){

let db=JSON.parse(localStorage.getItem("SubhyPower_MasterDB"))

if(!db){
db={billing:[],stock:[]}
}

/* REVENUE */

let revenue=0

db.billing.forEach(bill=>{

let amount=0

if(bill.amount){
amount=parseFloat(
String(bill.amount).replace(/[₹,]/g,'')
)
}

revenue+=isNaN(amount)?0:amount

})

document.getElementById("totalRevenue").innerText=
"₹ "+revenue.toLocaleString("en-IN")


/* TOTAL BILLS */

document.getElementById("totalBills").innerText=db.billing.length


/* UNIQUE CUSTOMERS */

let customers=new Set()

db.billing.forEach(b=>{
if(b.customer) customers.add(b.customer)
})

document.getElementById("totalCust").innerText=customers.size


/* LOW STOCK */

let low=0

db.stock.forEach(i=>{
let q=parseInt(i.qty)
if(!isNaN(q) && q<=5) low++
})

document.getElementById("lowStockCount").innerText=
low.toString().padStart(2,'0')


/* RECENT TRANSACTIONS */

const tbody=document.getElementById("recentTransactionsBody")
tbody.innerHTML=""

if(db.billing.length===0){

tbody.innerHTML=`
<tr>
<td colspan="5" style="text-align:center;padding:40px">
No transactions recorded
</td>
</tr>`

return
}

db.billing.slice(-5).reverse().forEach(bill=>{

let product="Items"

if(bill.items && bill.items.length){
product=bill.items.map(i=>i.name).join(", ")
}

let amount=bill.amount||"₹0"

tbody.innerHTML+=`

<tr>

<td style="color:var(--accent);font-weight:700">
#${bill.invNo||"N/A"}
</td>

<td>${bill.customer||"Walk-in"}</td>

<td>${product}</td>

<td>${amount}</td>

<td>
<span class="status-badge">
COMPLETED
</span>
</td>

</tr>

`

})

}

/* AUTO REFRESH DASHBOARD */

updateDashboard()
setInterval(updateDashboard,3000)

</script>

</body>
</html>
