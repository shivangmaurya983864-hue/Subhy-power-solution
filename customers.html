<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Database | Subhy Power Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="database.js"></script>

    <style>
        :root {
            --primary: #c21a09;
            --secondary: #0a2e87;
            --bg: #020617;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --accent: #3b82f6;
        }

        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; color: white; }

        .sidebar {
            width: 260px; background: rgba(10, 46, 135, 0.15); height: 100vh; position: fixed;
            padding: 30px 20px; border-right: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px);
        }

        .sidebar h2 { color: white; font-size: 1.2rem; border-left: 4px solid var(--primary); padding-left: 12px; margin-bottom: 40px; }
        .sidebar a { color: #94a3b8; text-decoration: none; padding: 12px; display: block; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; font-weight: 600; }
        .sidebar a:hover, .sidebar a.active { background: var(--secondary); color: white; }

        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .search-container { position: relative; width: 400px; }
        .search-input {
            width: 100%; padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: #1e293b; color: white; font-family: inherit; outline: none;
        }

        .card {
            background: var(--card); color: var(--text); padding: 30px; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: #f8fafc; color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 18px 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        tr:hover { background: #fcfdfe; }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { 
            width: 35px; height: 35px; background: var(--secondary); color: white; 
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 14px; text-transform: uppercase;
        }

        .btn-call { text-decoration: none; color: #10b981; font-weight: 700; font-size: 13px; margin-right: 15px; }
        .btn-delete {
            background: #fff1f2; color: #e11d48; border: none; padding: 6px 12px;
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 12px;
        }
        .btn-delete:hover { background: #e11d48; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>SUBHY POWER</h2>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="billing.html">🧾 Create Invoice</a>
        <a href="stock.html">📦 Inventory</a>
        <a href="warranty.html">🛡️ Warranty</a>
        <a href="customers.html" class="active">👥 Customers</a>
        <a href="reports.html">📈 Reports</a>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1 style="margin:0;">👥 Customer Database</h1>
            <div class="search-container">
                <input type="text" id="custSearch" class="search-input" placeholder="Search by name or phone..." onkeyup="filterCustomers()">
            </div>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Customer Name</th>
                        <th>Mobile Number</th>
                        <th>Location</th>
                        <th>Date Added</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="customerBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Database se data uthakar table mein dikhane ka function
        function loadCustomers() {
            const tbody = document.getElementById('customerBody');
            // Hum 'billing' data se unique customers nikalenge
            const db = JSON.parse(localStorage.getItem("SubhyPower_MasterDB")) || { billing: [] };
            
            tbody.innerHTML = ""; 

            // Duplicate customers hatane ke liye Map ka use
            const uniqueCustomers = [];
            const map = new Map();
            for (const item of db.billing) {
                if(!map.has(item.mobile)){
                    map.set(item.mobile, true);
                    uniqueCustomers.push(item);
                }
            }

            uniqueCustomers.forEach((cust, index) => {
                const initials = cust.customer.split(' ').map(n => n[0]).join('').substring(0,2);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="user-info">
                            <div class="avatar">${initials}</div>
                            <div><b>${cust.customer}</b><br><small style="color: #64748b;">Verified Customer</small></div>
                        </div>
                    </td>
                    <td>+91 ${cust.mobile}</td>
                    <td>Bhadohi</td>
                    <td>${cust.date}</td>
                    <td>
                        <a href="tel:${cust.mobile}" class="btn-call">📞 Call</a>
                        <button class="btn-delete" onclick="secureDelete('billing', ${index})">🗑️ Remove</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Search Filter Function
        function filterCustomers() {
            let input = document.getElementById('custSearch').value.toUpperCase();
            let rows = document.getElementById('customerBody').getElementsByTagName('tr');
            for (let i = 0; i < rows.length; i++) {
                let name = rows[i].getElementsByTagName('b')[0].innerText.toUpperCase();
                let mobile = rows[i].getElementsByTagName('td')[1].innerText.toUpperCase();
                if (name.indexOf(input) > -1 || mobile.indexOf(input) > -1) {
                    rows[i].style.display = "";
                } else {
                    rows[i].style.display = "none";
                }
            }
        }

        // Page load hone par function chalao
        window.onload = loadCustomers;
    </script>
</body>
</html>
