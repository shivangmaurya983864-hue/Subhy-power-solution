<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Database | Subhy Power Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="database.js"></script>

    <style>
        :root {
            --primary: #c21a09; --secondary: #0a2e87; --bg: #020617;
            --card: #ffffff; --text: #1e293b; --border: #e2e8f0; --accent: #3b82f6;
        }

        body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; color: white; }

        .sidebar {
            width: 260px; background: rgba(10, 46, 135, 0.15); height: 100vh; position: fixed;
            padding: 30px 20px; border-right: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px);
        }

        .sidebar h2 { color: white; font-size: 1.2rem; border-left: 4px solid var(--primary); padding-left: 12px; margin-bottom: 40px; }
        .sidebar a { color: #94a3b8; text-decoration: none; padding: 12px; display: block; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; font-weight: 600; }
        .sidebar a:hover, .sidebar a.active { background: var(--secondary); color: white; }

        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .search-input {
            width: 400px; padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: #1e293b; color: white; outline: none;
        }

        .card { background: var(--card); color: var(--text); padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: #f8fafc; color: #64748b; font-size: 11px; text-transform: uppercase; }
        td { padding: 18px 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        /* Clickable Profile */
        .user-info { display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .user-info:hover { transform: translateX(5px); }
        .avatar { 
            width: 35px; height: 35px; background: var(--secondary); color: white; 
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 14px;
        }

        .btn-call { text-decoration: none; color: #10b981; font-weight: 700; margin-right: 15px; }
        .btn-delete { background: #fff1f2; color: #e11d48; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; }

        /* MODAL STYLE (Bill Popup) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: white; color: #1e293b; margin: 5% auto; padding: 30px; border-radius: 20px; width: 500px; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #64748b; }
        .bill-details p { border-bottom: 1px solid #f1f5f9; padding: 10px 0; margin: 0; display: flex; justify-content: space-between; }
        .bill-details b { color: var(--secondary); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>SUBHY POWER</h2>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="billing.html">🧾 Create Invoice</a>
        <a href="stock.html">📦 Inventory</a>
        <a href="warranty.html">🛡️ Warranty</a>
        <a href="customers.html" class="active">👥 Customers</a>
        <a href="reports.html">📈 Reports</a>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>👥 Customer Database</h1>
            <input type="text" id="custSearch" class="search-input" placeholder="Search by name or phone..." onkeyup="filterCustomers()">
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Customer Name (Click to View Bill)</th>
                        <th>Mobile Number</th>
                        <th>Location</th>
                        <th>Date Added</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="customerBody"></tbody>
            </table>
        </div>
    </div>

    <div id="billModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 style="color: var(--secondary); margin-top: 0;">🧾 Invoice Summary</h2>
            <div id="billDetails" class="bill-details">
                </div>
            <button onclick="window.print()" style="width: 100%; margin-top: 20px; padding: 12px; background: var(--secondary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 700;">🖨️ Re-Print Bill</button>
        </div>
    </div>

    <script>
        function loadCustomers() {
            const tbody = document.getElementById('customerBody');
            const db = JSON.parse(localStorage.getItem("SubhyPower_MasterDB")) || { billing: [] };
            tbody.innerHTML = ""; 

            // Unique customers based on mobile
            const map = new Map();
            const uniqueCustomers = [];
            db.billing.forEach(item => {
                if(!map.has(item.mobile)){
                    map.set(item.mobile, true);
                    uniqueCustomers.push(item);
                }
            });

            uniqueCustomers.forEach((cust, index) => {
                const initials = cust.customer.split(' ').map(n => n[0]).join('').substring(0,2);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="user-info" onclick="viewBill('${cust.invNo}')">
                            <div class="avatar">${initials}</div>
                            <div><b>${cust.customer}</b><br><small style="color: #64748b;">Click to view last bill</small></div>
                        </div>
                    </td>
                    <td>+91 ${cust.mobile}</td>
                    <td>Bhadohi</td>
                    <td>${cust.date}</td>
                    <td>
                        <a href="tel:${cust.mobile}" class="btn-call">📞 Call</a>
                        <button class="btn-delete" onclick="secureDelete('billing', ${index})">🗑️ Remove</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Bill Dikhaane ka function
        function viewBill(invNo) {
            const db = JSON.parse(localStorage.getItem("SubhyPower_MasterDB"));
            const bill = db.billing.find(b => b.invNo === invNo);

            if(bill) {
                const details = document.getElementById('billDetails');
                details.innerHTML = `
                    <p><span>Invoice No:</span> <b>${bill.invNo}</b></p>
                    <p><span>Date:</span> <b>${bill.date}</b></p>
                    <p><span>Customer:</span> <b>${bill.customer}</b></p>
                    <p><span>Mobile:</span> <b>${bill.mobile}</b></p>
                    <p><span>Product:</span> <b>${bill.product}</b></p>
                    <p><span>Serial No:</span> <b>${bill.serial}</b></p>
                    <p style="font-size: 1.2rem; border-top: 2px solid #eee;"><span>Grand Total:</span> <b>${bill.amount}</b></p>
                `;
                document.getElementById('billModal').style.display = "block";
            }
        }

        function closeModal() {
            document.getElementById('billModal').style.display = "none";
        }

        // Close modal if clicked outside
        window.onclick = function(event) {
            if (event.target == document.getElementById('billModal')) closeModal();
        }

        function filterCustomers() {
            let input = document.getElementById('custSearch').value.toUpperCase();
            let rows = document.getElementById('customerBody').getElementsByTagName('tr');
            for (let i = 0; i < rows.length; i++) {
                let text = rows[i].innerText.toUpperCase();
                rows[i].style.display = text.indexOf(input) > -1 ? "" : "none";
            }
        }

        window.onload = loadCustomers;
    </script>
</body>
</html>
