<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | Subhy Power Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="database.js"></script>

    <style>
        :root {
            --primary: #c21a09;
            --secondary: #0a2e87;
            --bg: #020617;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            color: white;
        }

        .sidebar {
            width: 260px; background: rgba(10, 46, 135, 0.15); height: 100vh; position: fixed;
            padding: 30px 20px; border-right: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px);
        }

        .sidebar h2 { color: white; font-size: 1.2rem; border-left: 4px solid var(--primary); padding-left: 12px; margin-bottom: 40px; }
        .sidebar a { color: #94a3b8; text-decoration: none; padding: 12px; display: block; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; font-weight: 600; }
        .sidebar a:hover, .sidebar a.active { background: var(--secondary); color: white; }

        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        .btn-add {
            background: var(--secondary); color: white; border: none; padding: 12px 24px;
            border-radius: 12px; font-weight: 700; cursor: pointer; display: flex;
            align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-add:hover { background: var(--primary); transform: translateY(-2px); }

        .card {
            background: var(--card); color: var(--text); padding: 30px; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .filter-bar { display: flex; gap: 15px; margin-bottom: 25px; }
        .search-input {
            flex: 1; padding: 12px 18px; border: 1px solid var(--border);
            border-radius: 10px; font-family: inherit; outline: none;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: #f8fafc; color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 18px 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        tr:hover { background: #fcfdfe; }

        .badge { padding: 6px 12px; border-radius: 50px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-danger { background: #fee2e2; color: #991b1b; }

        .stock-count { font-weight: 700; font-size: 15px; }
        .btn-del { color: var(--danger); border: none; background: none; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>SUBHY POWER</h2>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="billing.html">🧾 Create Invoice</a>
        <a href="stock.html" class="active">📦 Inventory</a>
        <a href="warranty.html">🛡️ Warranty</a>
        <a href="customers.html">👥 Customers</a>
        <a href="reports.html">📈 Reports</a>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1 style="margin:0;">📦 Stock Management</h1>
            <button class="btn-add" onclick="addNewProduct()"><span>+</span> Add New Stock</button>
        </div>

        <div class="card">
            <div class="filter-bar">
                <input type="text" id="stockSearch" class="search-input" placeholder="🔍 Search product or brand..." onkeyup="filterStock()">
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Product Details</th>
                        <th>Brand</th>
                        <th>HSN Code</th>
                        <th>In Stock</th>
                        <th>Unit Price</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="stockTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Load Stock from Database
        function loadInventory() {
            const tbody = document.getElementById('stockTableBody');
            const db = JSON.parse(localStorage.getItem("SubhyPower_MasterDB")) || { stock: [] };
            tbody.innerHTML = "";

            db.stock.forEach((item, index) => {
                let statusBadge = "";
                let countClass = "";
                
                // Automatic Status Logic
                if (item.qty <= 0) {
                    statusBadge = '<span class="badge badge-danger">Out of Stock</span>';
                    countClass = "low-stock";
                } else if (item.qty < 5) {
                    statusBadge = '<span class="badge badge-warning">Low Stock</span>';
                    countClass = "low-stock";
                } else {
                    statusBadge = '<span class="badge badge-success">In Stock</span>';
                }

                tbody.innerHTML += `
                    <tr>
                        <td><b>${item.name}</b></td>
                        <td><span style="color: var(--secondary); font-weight: 600;">${item.brand || 'N/A'}</span></td>
                        <td>${item.hsn}</td>
                        <td><span class="stock-count ${countClass}">${item.qty} Units</span></td>
                        <td>₹${item.price}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="btn-del" onclick="secureDelete('stock', ${index})">🗑️ Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        // Add Product Function
        function addNewProduct() {
            const name = prompt("Enter Product Name (e.g., 150Ah Battery):");
            if (!name) return;
            const brand = prompt("Enter Brand (Luminous/Exide):");
            const hsn = prompt("Enter HSN Code:");
            const qty = parseInt(prompt("Enter Opening Stock Quantity:"));
            const price = prompt("Enter Unit Price (₹):");

            if (name && qty >= 0) {
                saveData('stock', { name, brand, hsn, qty, price });
                loadInventory();
            } else {
                alert("Invalid input!");
            }
        }

        // Search Function
        function filterStock() {
            let input = document.getElementById('stockSearch').value.toUpperCase();
            let rows = document.getElementById('stockTableBody').getElementsByTagName('tr');
            for (let row of rows) {
                row.style.display = row.innerText.toUpperCase().includes(input) ? "" : "none";
            }
        }

        // Initialize
        window.onload = loadInventory;
    </script>
</body>
</html>
